version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: program-api:latest
    container_name: program-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/program
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    env_file:
      - .env.production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
    networks:
      - backend-network
    volumes:
      - app_uploads:/app/uploads
      - app_quarantine:/app/quarantine
      - app_logs:/app/logs

  mongo:
    image: mongo:6-jammy
    container_name: program-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=program
    volumes:
      - mongo_data:/data/db
    networks:
      - backend-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: program-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:latest
    container_name: program-clamav
    restart: always
    ports:
      - "3310:3310"
    networks:
      - backend-network

  prometheus:
    image: prom/prometheus:latest
    container_name: program-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  app_uploads:
  app_quarantine:
  app_logs:
