<!DOCTYPE html>
<html lang="en">

<head>
    <title>Program</title>
    <!-- Add this exact line right here: -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%231a1c28'/%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23FB923C'/%3E%3Cstop offset='100%25' stop-color='%23EC4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50%25' y='58%25' font-family='Arial, sans-serif' font-weight='900' font-size='44' fill='url(%23grad)' dominant-baseline='middle' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/content.css">
    <script src="./scripts/content.js" defer></script>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-row-top">
            <!-- New Pure Text Logo that matches theme perfectly! -->
            <div class="nav-logo">
                <span
                    style="background: linear-gradient(135deg, var(--c-orange), var(--c-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px;">P</span>
                <span class="nav-brand" style="margin-left: -4px;">rogram</span>
            </div>

            <div class="nav-search">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="Search courses, lessons, topics...">
            </div>

            <div class="nav-controls">
                <button class="nav-icon-btn" id="themeToggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="1.8">
                        <circle cx="12" cy="12" r="4"></circle>
                        <line x1="12" y1="2" x2="12" y2="4"></line>
                        <line x1="12" y1="20" x2="12" y2="22"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="2" y1="12" x2="4" y2="12"></line>
                        <line x1="20" y1="12" x2="22" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>

                <button class="nav-icon-btn nav-bell">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="1.8">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="nav-dot"></span>
                </button>

                <div class="profile-wrapper">
                    <div class="nav-avatar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="8" r="4"></circle>
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
                        </svg>
                    </div>
                    <div class="profile-tooltip">
                        <div class="tooltip-name">Ahmed Nashaat</div>
                        <hr class="tooltip-divider">
                        <a href="#" class="tooltip-link">Profile</a>
                        <a href="#" class="tooltip-link">Settings</a>
                        <hr class="tooltip-divider">
                        <a href="#" class="tooltip-link logout-link">Log out</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-row-bottom">
            <button class="nav-tab active" id="tab-explore">Explore</button>
            <button class="nav-tab" id="tab-dashboard">Dashboard</button>
            <button class="nav-tab" id="tab-courses">My Courses</button>
            <button class="nav-tab" disabled>
                Certificates <span class="badge-soon">Coming soon</span>
            </button>
            <!-- The Sliding Indicator -->
            <div class="nav-indicator" id="navIndicator"></div>
        </div>
    </nav>

    <div class="content"></div>
</body>

</html>
