<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Theme Gradient -->
    <linearGradient id="themeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <!-- 3D Drop Shadow for the "Embossed" look -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Custom Ribbon 'P' -->
    <path d="
      M 15 10 
      L 60 10 
      C 105 10, 110 65, 60 65 
      L 45 65 
      C 20 65, 10 85, 0 105 
      C 15 85, 30 75, 50 75 
      C 85 75, 85 25, 60 25 
      L 15 25 
      Z" 
      fill="url(#themeGrad)"
    />
  </g>
</svg>
